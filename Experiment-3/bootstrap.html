<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Workshop Registration</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- External CSS -->
<link rel="stylesheet" href="style.css">

</head>
<body>

<main class="container py-5">

    <header class="text-center mb-5">
        <h1 class="fw-bold display-4">3D Workshop Registration</h1>
        <p class="lead">Join our interactive workshops in AI, Web, and 3D design!</p>
    </header>

    <!-- Interactive 3D Card -->
    <section class="card interactive-card mx-auto p-4 shadow-lg">
        <div class="card-body">

            <div class="row g-4">
                <!-- Left Side: Media -->
                <div class="col-md-6 d-flex flex-column align-items-center justify-content-center">
                    <figure class="mb-3 w-100">
                        <img src="banner.jpg" class="img-fluid rounded media-hover" alt="3D Workshop Banner">
                    </figure>

                    <video class="w-100 mb-3 media-hover" controls>
                        <source src="promo.mp4" type="video/mp4">
                    </video>

                    <audio class="w-100 media-hover" controls>
                        <source src="audio.mp3" type="audio/mpeg">
                    </audio>
                </div>

                <!-- Right Side: Form -->
                <div class="col-md-6">
                    <form id="registration-form" class="needs-validation" novalidate>

                        <!-- Floating Labels -->
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="fullname" placeholder="Full Name" required>
                            <label for="fullname">Full Name</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email" placeholder="Email" required>
                            <label for="email">Email</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="date" class="form-control" id="dob" placeholder="Date of Birth" required>
                            <label for="dob">Date of Birth</label>
                        </div>

                        <!-- Gender -->
                        <div class="mb-3">
                            <label class="form-label">Gender</label>
                            <div class="d-flex gap-3">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="male" value="male" required>
                                    <label class="form-check-label" for="male">Male</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                                    <label class="form-check-label" for="female">Female</label>
                                </div>
                            </div>
                        </div>

                        <!-- Workshop -->
                        <div class="form-floating mb-3">
                            <select class="form-select" id="workshop" required>
                                <option value="">Choose Workshop</option>
                                <option value="ai">AI Workshop</option>
                                <option value="web">Web Development</option>
                                <option value="3d">3D Design</option>
                            </select>
                            <label for="workshop">Workshop</label>
                        </div>

                        <!-- Message -->
                        <div class="form-floating mb-3">
                            <textarea class="form-control" placeholder="Your Message" id="message" style="height: 100px;"></textarea>
                            <label for="message">Message</label>
                        </div>

                        <!-- File Upload -->
                        <div class="mb-3">
                            <label for="file" class="form-label">Upload File</label>
                            <input class="form-control" type="file" id="file" accept=".jpg,.png,.pdf">
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary btn-lg btn-glow mt-3">Register</button>
                        </div>

                        <p id="success-message" class="mt-3 text-success text-center" aria-live="polite"></p>
                    </form>
                </div>
            </div>

        </div>
    </section>

</main>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 3D tilt effect
    const card = document.querySelector(".interactive-card");
    card.addEventListener("mousemove", e => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const rotateX = ((y - centerY) / centerY) * 8;
        const rotateY = ((x - centerX) / centerX) * -8;
        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
    });
    card.addEventListener("mouseleave", () => {
        card.style.transform = "perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)";
    });

    // Form submit
    document.getElementById("registration-form").addEventListener("submit", function(e) {
        e.preventDefault();
        const msg = document.getElementById("success-message");
        msg.innerText = "Registration Successful!";
        msg.classList.add("fade-in");
    });
</script>

</body>
</html>
