<!DOCTYPE html>
<html>
<head>
    <title>Registration Successful</title>
    <script src="jquery-4.0.0.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 100px; }
        .success-card { border: 2px solid #27ae60; display: inline-block; padding: 30px; border-radius: 15px; background: #f1fcf4; }
        h1 { color: #27ae60; }
        #confirmedEvent { font-weight: bold; color: #333; font-size: 1.5em; }
    </style>
</head>
<body>

    <div class="success-card">
        <h1>✔ Successfully Registered!</h1>
        <p>You have been signed up for:</p>
        <p id="confirmedEvent"></p>
        <br>
        <a href="events.html">Back to Events</a>
    </div>

    <script>
    $(document).ready(function() {
        // Retrieve the event name one last time to show confirmation
        var params = new URLSearchParams(window.location.search);
        var name = params.get('event');
        if (name) {
            $("#confirmedEvent").text(name);
        }
    });
    </script>
</body>
</html>
