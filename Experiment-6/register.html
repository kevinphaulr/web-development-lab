<!DOCTYPE html>
<html>

<head>

<title>Event Registration</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

body{
font-family: Arial;
padding:40px;
background:#f2f2f2;
}

form{
background:white;
padding:20px;
width:350px;
border-radius:8px;
}

input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
}

button{
padding:8px 15px;
margin-top:10px;
}

#message{
font-weight:bold;
margin-top:10px;
}

.error{
color:red;
}

.success{
color:green;
}

</style>

</head>

<body>

<h2>Event Registration</h2>

<form id="regForm">

<label>Participant Name</label>
<input type="text" id="name">

<label>Email</label>
<input type="text" id="email">

<label>Event Name</label>
<input type="text" id="event" readonly>

<label>Mobile Number</label>
<input type="text" id="mobile">

<button type="submit" id="submitBtn">Submit</button>
<button type="reset">Reset</button>

<p id="message"></p>

</form>

<script>

// get event name from URL
let params=new URLSearchParams(window.location.search);
let eventName=params.get("event");

$("#event").val(eventName);

// submit validation
$("#regForm").submit(function(e){

e.preventDefault();

let name=$("#name").val();
let email=$("#email").val();
let mobile=$("#mobile").val();

let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
let mobilePattern=/^[0-9]{10,}$/;

if(name=="" || email=="" || mobile==""){

$("#message").text("All fields required")
.css("color","red");

$("input").css("border","1px solid red");

}

else if(!emailPattern.test(email)){

$("#message").text("Invalid Email")
.css("color","red");

$("#email").css("border","2px solid red");

}

else if(!mobilePattern.test(mobile)){

$("#message").text("Invalid Mobile Number")
.css("color","red");

$("#mobile").css("border","2px solid red");

}

else{

$("#message")
.text("Registration Successful for "+name)
.css("color","green");

$("#submitBtn")
.prop("disabled",true)
.text("Registered");

}

});

$("#regForm").on("reset",function(){

$("#message").text("");
$("input").css("border","");

});

</script>

</body>
</html>
